name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Prepare and Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN non configurato: sincronizzazione verso Hugging Face saltata."
            exit 0
          fi

          echo "Pulizia dei file non necessari per la produzione..."
          # Aggiungi qui eventuali file da ignorare durante il push su HF (opzionale)

          rm -rf .git
          git init
          git checkout -b main

          git config user.name "GitHub Action"
          git config user.email "actions@github.com"

          echo "Configurazione di Git LFS per modelli o file pesanti..."
          git lfs install
          git lfs track "*.mp4"
          git lfs track "*.png"
          git lfs track "*.jpg"
          git lfs track "*.jpeg"

          echo "Creazione del pacchetto di deploy..."
          git add .gitattributes
          git add .
          git commit -m "🚀 Auto-deploy from GitHub Actions"

          # Utilizzo il tuo username Gabriele-fuoco e il nome del nuovo progetto
          git remote add hf "https://Gabriele-fuoco:${HF_TOKEN}@huggingface.co/spaces/Gabriele-fuoco/humanhumanhuman-nizer"
          git config http.postBuffer 1048576000
          git config http.version HTTP/1.1

          echo "Inviando codice e file multimediali LFS a Hugging Face..."
          max_retries=5
          retry_delay=30
          for i in $(seq 1 $max_retries); do
            echo "Tentativo $i di $max_retries..."
            if git -c protocol.version=0 push -f hf main; then
              echo "Push completato con successo!"
              exit 0
            fi
            echo "Push fallito. Attesa di $retry_delay secondi prima di riprovare (possibile errore 429 Too Many Requests)..."
            sleep $retry_delay
          done
          echo "Impossibile completare il push dopo $max_retries tentativi. Controlla HF_TOKEN e la connettività remota."
          exit 1
