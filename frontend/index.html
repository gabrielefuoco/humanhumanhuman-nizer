<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: transparent; 
        color: #f8fafc; 
        padding: 10px; 
        line-height: 1.8;
        font-size: 16px;
    }
    .word { cursor: pointer; transition: color 0.2s; padding: 0 2px; }
    .word.low-ppl { 
        color: #f87171; 
        border-bottom: 1px dashed #f87171; 
        font-weight: 600;
    }
    .word.cliche { 
        color: #eab308; 
        border-bottom: 1px dashed #eab308; 
        font-weight: 600;
    }
    .word:hover { background-color: rgba(255,255,255,0.1); border-radius: 3px; }
    
    #context-menu {
      display: none;
      position: absolute;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 1000;
      padding: 5px 0;
      min-width: 150px;
    }
    .menu-item {
      padding: 8px 15px;
      cursor: pointer;
      color: #e2e8f0;
      font-size: 14px;
    }
    .menu-item:hover {
      background: #3b82f6;
      color: white;
    }
    .menu-item .score {
      float: right;
      font-size: 11px;
      color: #94a3b8;
      margin-left: 10px;
    }
    .menu-item:hover .score { color: #e0f2fe; }
    .loader { padding: 8px 15px; font-size: 12px; color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>
  <div id="text-container"></div>
  <div id="context-menu"></div>
  
  <script src="https://unpkg.com/streamlit-component-lib@1.3.0/dist/streamlit.js"></script>
  <script>
    let currentSelectedWordId = null;
    let wordsData = [];
    let synonymsData = {}; // wordId -> { synonyms: [...] }
    let lastText = "";

    function renderText() {
        const container = document.getElementById("text-container");
        container.innerHTML = "";
        wordsData.forEach((w, i) => {
            let span = document.createElement("span");
            span.textContent = w.word + " ";
            
            let classes = ["word"];
            if (w.isLowPpl) classes.push("low-ppl");
            if (w.isCliche) classes.push("cliche");
            span.className = classes.join(" ");
            span.dataset.id = i;
            
            span.addEventListener("contextmenu", (e) => {
                if(w.isLowPpl || w.isCliche) {
                    e.preventDefault();
                    showContextMenu(e.pageX, e.pageY, i);
                }
            });
            container.appendChild(span);
        });
        Streamlit.setFrameHeight();
    }

    function showContextMenu(x, y, wordId) {
        const menu = document.getElementById("context-menu");
        currentSelectedWordId = wordId;
        const w = wordsData[wordId];
        
        menu.style.left = x + "px";
        menu.style.top = y + "px";
        menu.style.display = "block";
        
        if (!synonymsData[wordId] || synonymsData[wordId].loading) {
            menu.innerHTML = "<div class='loader'>Calcolo sinonimi e PPL...</div>";
            Streamlit.setComponentValue({ action: "get_synonyms", word_id: wordId, word: w.word });
        } else {
            renderSynonymsMenu(synonymsData[wordId].synonyms);
        }
    }

    function renderSynonymsMenu(syns) {
        const menu = document.getElementById("context-menu");
        menu.innerHTML = "";
        if (syns.length === 0) {
            menu.innerHTML = "<div class='loader'>Nessun sinonimo (NLTK)</div>";
            return;
        }
        syns.forEach(syn => {
            let item = document.createElement("div");
            item.className = "menu-item";
            item.innerHTML = `${syn.word} <span class='score'>PPL: ${syn.score.toFixed(1)}</span>`;
            item.onclick = () => {
                Streamlit.setComponentValue({ action: "replace_word", word_id: currentSelectedWordId, new_word: syn.word });
                menu.style.display = "none";
            };
            menu.appendChild(item);
        });
    }

    document.addEventListener("click", () => {
        document.getElementById("context-menu").style.display = "none";
    });

    function onRender(event) {
        const data = event.detail.args;
        
        if (data.synonyms_update) {
            synonymsData[data.synonyms_word_id] = { loading: false, synonyms: data.synonyms_list };
            if (currentSelectedWordId === data.synonyms_word_id && document.getElementById("context-menu").style.display === "block") {
                renderSynonymsMenu(data.synonyms_list);
            }
            return; 
        }

        if (data.words && JSON.stringify(data.words) !== lastText) {
            lastText = JSON.stringify(data.words);
            wordsData = data.words;
            synonymsData = {};
            renderText();
        }
        Streamlit.setFrameHeight();
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    Streamlit.setFrameHeight();
  </script>
</body>
</html>
