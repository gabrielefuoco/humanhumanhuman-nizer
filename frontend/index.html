<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: transparent; 
        color: #f8fafc; 
        padding: 20px; 
        line-height: 1.9;
        font-size: 16px;
    }
    .sentence {
        position: relative;
        display: inline;
        border-radius: 4px;
        transition: background 0.2s;
    }
    .sentence.critical {
        background-color: rgba(248, 113, 113, 0.1);
        border-bottom: 1px dashed rgba(248, 113, 113, 0.5);
    }
    .sentence:hover .rewrite-btn { display: inline-block; }
    
    .rewrite-btn {
        display: none; 
        position: absolute; 
        top: -35px; 
        left: 0; 
        background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
        color: white;
        font-size: 12px; 
        padding: 6px 12px; 
        border-radius: 12px; 
        cursor: pointer; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        white-space: nowrap; 
        font-weight: bold; 
        z-index: 100;
        user-select: none;
    }
    .sentence.critical .rewrite-btn { background: linear-gradient(135deg, #ef4444, #f59e0b); }
    .rewrite-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    
    .metrics-badge {
        font-size: 11px;
        color: rgba(255,255,255,0.5);
        background: rgba(0,0,0,0.2);
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 6px;
        vertical-align: middle;
        user-select: none;
    }
    .sentence.critical .metrics-badge {
        color: #f87171;
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .word { cursor: pointer; transition: color 0.2s; padding: 0 1px; }
    .word.low-ppl { 
        color: #f87171; 
        font-weight: 600;
    }
    .word.cliche { 
        color: #eab308; 
        font-weight: 600;
    }
    .word:hover { background-color: rgba(255,255,255,0.1); border-radius: 3px; }
    
    #context-menu {
      display: none;
      position: absolute;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 1000;
      padding: 5px 0;
      min-width: 150px;
    }
    .menu-item {
      padding: 8px 15px;
      cursor: pointer;
      color: #e2e8f0;
      font-size: 14px;
    }
    .menu-item:hover {
      background: #3b82f6;
      color: white;
    }
    .menu-item .score {
      float: right;
      font-size: 11px;
      color: #94a3b8;
      margin-left: 10px;
    }
    .menu-item:hover .score { color: #e0f2fe; }
    .loader { padding: 8px 15px; font-size: 12px; color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>
  <div id="text-container"></div>
  <div id="context-menu"></div>
  <script>
    const Streamlit = {
        setComponentReady: function() {
            window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
        },
        setFrameHeight: function(height) {
            window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: height || document.body.scrollHeight }, "*");
        },
        setComponentValue: function(value) {
            window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value, dataType: "json" }, "*");
        }
    };

    window.addEventListener("message", function(event) {
        if (event.data && event.data.type === "streamlit:render") {
            onRender(event.data);
        }
    });

    let currentSIdx = null;
    let currentWIdx = null;
    let sentencesData = [];
    let synonymsData = {}; 
    let lastText = "";

    function renderText() {
        const container = document.getElementById("text-container");
        container.innerHTML = "";
        
        sentencesData.forEach((s, sIdx) => {
            let sSpan = document.createElement("span");
            sSpan.className = "sentence" + (s.isCritical ? " critical" : "");
            sSpan.dataset.idx = sIdx;
            
            // Il pulsante di riscrittura è disponibile per TUTTE le frasi
            let btn = document.createElement("div");
            btn.className = "rewrite-btn";
            btn.textContent = s.isCritical ? "⚠️ Riscrivi frase AI" : "🪄 Riscrivi frase";
            btn.onclick = (e) => {
                e.stopPropagation();
                Streamlit.setComponentValue({ action: "rewrite_sentence", sentence_idx: sIdx, text: s.text });
                btn.textContent = "⏳ Riscrittura in corso...";
                btn.style.pointerEvents = "none";
            };
            sSpan.appendChild(btn);
            
            s.words.forEach((w, wIdx) => {
                let wSpan = document.createElement("span");
                wSpan.textContent = w.word + " ";
                
                let classes = ["word"];
                if (w.isLowPpl) classes.push("low-ppl");
                if (w.isCliche) classes.push("cliche");
                wSpan.className = classes.join(" ");
                
                wSpan.addEventListener("contextmenu", (e) => {
                    if(w.isLowPpl || w.isCliche) {
                        e.preventDefault();
                        showContextMenu(e.pageX, e.pageY, sIdx, wIdx);
                    }
                });
                sSpan.appendChild(wSpan);
            });
            
            // Aggiungiamo i punteggi di AI Detection
            if (s.ppl !== undefined && s.aiScore !== undefined) {
                let badge = document.createElement("span");
                badge.className = "metrics-badge";
                badge.textContent = `AI: ${s.aiScore}% | PPL: ${s.ppl}`;
                sSpan.appendChild(badge);
            }
            
            sSpan.appendChild(document.createTextNode(" "));
            container.appendChild(sSpan);
        });
        Streamlit.setFrameHeight();
    }

    function showContextMenu(x, y, sIdx, wIdx) {
        const menu = document.getElementById("context-menu");
        currentSIdx = sIdx;
        currentWIdx = wIdx;
        const w = sentencesData[sIdx].words[wIdx];
        
        menu.style.left = x + "px";
        menu.style.top = y + "px";
        menu.style.display = "block";
        
        const cacheKey = sIdx + "_" + wIdx;
        if (!synonymsData[cacheKey] || synonymsData[cacheKey].loading) {
            menu.innerHTML = "<div class='loader'>Calcolo sinonimi...</div>";
            Streamlit.setComponentValue({ action: "get_synonyms", sentence_idx: sIdx, word_idx: wIdx, word: w.word });
        } else {
            renderSynonymsMenu(synonymsData[cacheKey].synonyms);
        }
    }

    function renderSynonymsMenu(syns) {
        const menu = document.getElementById("context-menu");
        menu.innerHTML = "";
        if (syns.length === 0) {
            menu.innerHTML = "<div class='loader'>Nessun sinonimo (NLTK)</div>";
            return;
        }
        syns.forEach(syn => {
            let item = document.createElement("div");
            item.className = "menu-item";
            item.innerHTML = `${syn.word} <span class='score'>PPL: ${syn.score.toFixed(1)}</span>`;
            item.onclick = () => {
                Streamlit.setComponentValue({ 
                    action: "replace_word", 
                    sentence_idx: currentSIdx, 
                    word_idx: currentWIdx, 
                    new_word: syn.word 
                });
                menu.style.display = "none";
            };
            menu.appendChild(item);
        });
    }

    document.addEventListener("click", () => {
        document.getElementById("context-menu").style.display = "none";
    });

    function onRender(eventData) {
        const data = eventData.args;
        
        if (data.synonyms_update) {
            const cacheKey = data.synonyms_s_idx + "_" + data.synonyms_w_idx;
            synonymsData[cacheKey] = { loading: false, synonyms: data.synonyms_list };
            if (currentSIdx === data.synonyms_s_idx && currentWIdx === data.synonyms_w_idx && document.getElementById("context-menu").style.display === "block") {
                renderSynonymsMenu(data.synonyms_list);
            }
            return; 
        }

        if (data.sentences && JSON.stringify(data.sentences) !== lastText) {
            lastText = JSON.stringify(data.sentences);
            sentencesData = data.sentences;
            synonymsData = {};
            renderText();
        }
        Streamlit.setFrameHeight();
    }

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight();
  </script>
</body>
</html>
